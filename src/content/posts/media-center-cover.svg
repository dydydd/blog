<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="cd2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0c1929"/>
    </linearGradient>
    <linearGradient id="symedia" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b1f6e"/>
      <stop offset="100%" stop-color="#1a0d33"/>
    </linearGradient>
    <linearGradient id="emby" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a5c3a"/>
      <stop offset="100%" stop-color="#0a2e1c"/>
    </linearGradient>
    <linearGradient id="redia" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c2d12"/>
      <stop offset="100%" stop-color="#3a1508"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>

  <!-- Title -->
  <text x="600" y="80" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700">
    家庭媒体中心全家桶部署教程
  </text>
  <text x="600" y="112" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="16">
    CD2 + Emby + Symedia + Redia · 从零搭建你的专属媒体库
  </text>

  <!-- Arrow line from left to right -->
  <line x1="60" y1="300" x2="1140" y2="300" stroke="#334155" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Arrows between blocks -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a855f7"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316"/>
    </marker>
  </defs>

  <!-- 1. CloudDrive2 -->
  <g filter="url(#shadow)">
    <rect x="40" y="220" width="220" height="160" rx="12" fill="url(#cd2)" stroke="#3b82f6" stroke-width="2"/>
    <rect x="40" y="220" width="220" height="40" rx="12" fill="#1d4ed8" opacity="0.3"/>
    <rect x="40" y="248" width="220" height="12" fill="#1d4ed8" opacity="0.3"/>
    <!-- Cloud icon -->
    <text x="150" y="250" text-anchor="middle" fill="#60a5fa" font-size="22">☁️</text>
    <text x="150" y="295" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="18" font-weight="600">CloudDrive2</text>
    <text x="150" y="318" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="13">云盘挂载</text>
    <text x="150" y="340" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="11">端口 19798</text>
    <text x="150" y="358" text-anchor="middle" fill="#475569" font-family="monospace" font-size="10">115 / 阿里云 / 百度</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="260" y1="300" x2="340" y2="300" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="300" y="288" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="10">挂载</text>

  <!-- 2. Symedia -->
  <g filter="url(#shadow)">
    <rect x="350" y="220" width="220" height="160" rx="12" fill="url(#symedia)" stroke="#a855f7" stroke-width="2"/>
    <rect x="350" y="220" width="220" height="40" rx="12" fill="#7e22ce" opacity="0.3"/>
    <rect x="350" y="248" width="220" height="12" fill="#7e22ce" opacity="0.3"/>
    <text x="460" y="250" text-anchor="middle" fill="#c084fc" font-size="22">🤖</text>
    <text x="460" y="295" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="18" font-weight="600">Symedia</text>
    <text x="460" y="318" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="13">Strm 生成 · 刮削</text>
    <text x="460" y="340" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="11">端口 8095</text>
    <text x="460" y="358" text-anchor="middle" fill="#475569" font-family="monospace" font-size="10">CD2 助手 / Webhook</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="570" y1="300" x2="650" y2="300" stroke="#22c55e" stroke-width="3" marker-end="url(#arrow-green)"/>
  <text x="610" y="288" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="10">strm</text>

  <!-- 3. Emby -->
  <g filter="url(#shadow)">
    <rect x="660" y="220" width="220" height="160" rx="12" fill="url(#emby)" stroke="#22c55e" stroke-width="2"/>
    <rect x="660" y="220" width="220" height="40" rx="12" fill="#15803d" opacity="0.3"/>
    <rect x="660" y="248" width="220" height="12" fill="#15803d" opacity="0.3"/>
    <text x="770" y="250" text-anchor="middle" fill="#4ade80" font-size="22">🎬</text>
    <text x="770" y="295" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="18" font-weight="600">Emby</text>
    <text x="770" y="318" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="13">媒体库 · 海报墙</text>
    <text x="770" y="340" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="11">端口 8096</text>
    <text x="770" y="358" text-anchor="middle" fill="#475569" font-family="monospace" font-size="10">神医插件加速</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="880" y1="300" x2="960" y2="300" stroke="#f97316" stroke-width="3" marker-end="url(#arrow-orange)"/>
  <text x="920" y="288" text-anchor="middle" fill="#f97316" font-family="monospace" font-size="10">302</text>

  <!-- 4. Redia -->
  <g filter="url(#shadow)">
    <rect x="970" y="220" width="190" height="160" rx="12" fill="url(#redia)" stroke="#f97316" stroke-width="2"/>
    <rect x="970" y="220" width="190" height="40" rx="12" fill="#c2410c" opacity="0.3"/>
    <rect x="970" y="248" width="190" height="12" fill="#c2410c" opacity="0.3"/>
    <text x="1065" y="250" text-anchor="middle" fill="#fdba74" font-size="22">⚡</text>
    <text x="1065" y="295" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="18" font-weight="600">Redia</text>
    <text x="1065" y="318" text-anchor="middle" fill="#fdba74" font-family="monospace" font-size="13">302 直链</text>
    <text x="1065" y="340" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="11">端口 9025</text>
    <text x="1065" y="358" text-anchor="middle" fill="#475569" font-family="monospace" font-size="10">反向代理</text>
  </g>

  <!-- User endpoint -->
  <g>
    <rect x="520" y="420" width="160" height="50" rx="25" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <text x="600" y="450" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">📱 用户播放</text>
  </g>
  <line x1="1065" y1="380" x2="1065" y2="410" stroke="#475569" stroke-width="1.5"/>
  <line x1="1065" y1="410" x2="600" y2="420" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Bottom info cards -->
  <!-- Card 1 -->
  <g filter="url(#shadow)">
    <rect x="40" y="480" width="350" height="120" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="60" y="508" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="14" font-weight="600">🐳 Docker Compose</text>
    <text x="60" y="535" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">每个服务独立 compose 文件</text>
    <text x="60" y="558" fill="#64748b" font-family="monospace" font-size="11">模块化管理，独立更新</text>
    <text x="60" y="580" fill="#64748b" font-family="monospace" font-size="11">一键备份恢复</text>
  </g>

  <!-- Card 2 -->
  <g filter="url(#shadow)">
    <rect x="425" y="480" width="350" height="120" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="445" y="508" fill="#4ade80" font-family="system-ui, sans-serif" font-size="14" font-weight="600">🔗 完整链路</text>
    <text x="445" y="535" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">115网盘 → CD2 → Symedia</text>
    <text x="445" y="558" fill="#64748b" font-family="monospace" font-size="11">→ Emby 海报墙 → Redia 302 直链</text>
    <text x="445" y="580" fill="#64748b" font-family="monospace" font-size="11">自动 Strm 生成 + 刮削归档</text>
  </g>

  <!-- Card 3 -->
  <g filter="url(#shadow)">
    <rect x="810" y="480" width="350" height="120" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="830" y="508" fill="#f97316" font-family="system-ui, sans-serif" font-size="14" font-weight="600">⚡ 关键功能</text>
    <text x="830" y="535" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">Webhook 实时监控网盘变化</text>
    <text x="830" y="558" fill="#64748b" font-family="monospace" font-size="11">Telegram Bot 通知 + 远程转存</text>
    <text x="830" y="580" fill="#64748b" font-family="monospace" font-size="11">神医插件加速 Strm 起播</text>
  </g>

  <!-- Footer -->
  <text x="600" y="618" text-anchor="middle" fill="#334155" font-family="system-ui, sans-serif" font-size="11">基于 Docker Compose 部署 · 2026</text>
</svg>
